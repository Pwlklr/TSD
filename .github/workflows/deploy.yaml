name: Deploy to GCP

on:
  push:
    branches:
      - Deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e

            cd /home/pawel_kelar_put/TSD

            git config --global --add safe.directory /home/pawel_kelar_put/TSD
            sudo chown -R $USER:$USER /home/pawel_kelar_put/TSD/.git
            sudo chmod -R u+rwX /home/pawel_kelar_put/TSD/.git

            echo "=== Current branch ==="
            git branch --show-current

            echo "=== Fetch origin ==="
            git fetch origin

            echo "=== Current commit on VM ==="
            git log -1 --oneline --decorate

            echo "=== origin/main commit ==="
            git log -1 --oneline origin/main

            echo "=== origin/Deploy commit ==="
            git log -1 --oneline origin/Deploy

            echo "=== Git status short ==="
            git status --short

            echo "=== Changed tracked files ==="
            git diff --name-only

            echo "=== Untracked files ==="
            git ls-files --others --exclude-standard

            echo "=== docker-compose.yml diff on VM ==="
            git diff -- docker-compose.yml

            echo "=== docker-compose.yml ports in origin/main ==="
            git show origin/main:docker-compose.yml | grep -A5 "ports:" || true

            echo "=== docker-compose.yml ports in origin/Deploy ==="
            git show origin/Deploy:docker-compose.yml | grep -A5 "ports:" || true

            echo "=== Done, no reset, no deploy executed ==="
