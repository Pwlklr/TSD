name: Deploy to GCP

on:
  push:
    branches:
      - Deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            cd /home/pawel_kelar_put/TSD
            
            echo "=== Current user ==="
            whoami

            echo "=== Current directory ==="
            pwd

            echo "=== Project folder owner ==="
            ls -ld /home/pawel_kelar_put/TSD

            echo "=== .git folder owner ==="
            ls -ld /home/pawel_kelar_put/TSD/.git

            echo "=== FETCH_HEAD owner ==="
            ls -l /home/pawel_kelar_put/TSD/.git/FETCH_HEAD || true

            echo "=== Git status test ==="
            git config --global --add safe.directory /home/pawel_kelar_put/TSD
            git status

            
            # Pobranie najnowszego kodu
            git pull origin main
            
            # Utworzenie pliku .env z sekretów GitHuba
            cat <<EOF | sudo tee .env > /dev/null
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_MS=${{ secrets.JWT_EXPIRATION_MS }}
            EOF
            
            sudo docker-compose down

            sudo docker-compose up -d --build
            
            sudo docker image prune -f
