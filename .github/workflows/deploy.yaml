name: Deploy to GCP

on:
  push:
    branches:
      - Deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e

            cd /home/pawel_kelar_put/TSD

            git config --global --add safe.directory /home/pawel_kelar_put/TSD

            echo "=== Fix .git permissions ==="
            sudo chown -R $USER:$USER /home/pawel_kelar_put/TSD/.git
            sudo chmod -R u+rwX /home/pawel_kelar_put/TSD/.git

            echo "=== Test write to .git ==="
            touch /home/pawel_kelar_put/TSD/.git/test_write_file
            rm /home/pawel_kelar_put/TSD/.git/test_write_file

            echo "=== Try git fetch ==="
            git fetch origin

            echo "=== Done, no deploy executed ==="
